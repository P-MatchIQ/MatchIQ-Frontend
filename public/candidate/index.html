<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>MatchIQ · Candidate Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../../src/styles/company.css" />
    <link rel="stylesheet" href="../../src/styles/candidate-dashboard.css" />
</head>

<body>
    <div class="app" id="mainLayout" style="display: none;">

        <!-- ─── SIDEBAR ─── -->
        <aside class="sidebar">
            <div class="sidebar__top">
                <a class="brand" href="#/dashboard">
                    <img class="brand__mark" src="../../src/assets/iconoMatchIQ.png" alt="MatchIQ logo" />
                </a>

                <nav class="nav" id="sidebar-nav">
                    <a class="nav__item is-active" href="#/dashboard" data-route="dashboard">
                        <span class="nav__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V-10h-8v10zm0-18v6h8V3h-8z" />
                            </svg>
                        </span>
                        <span>Dashboard</span>
                    </a>

                    <a class="nav__item" href="#/profile" data-route="profile">
                        <span class="nav__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z" />
                            </svg>
                        </span>
                        <span>My Profile</span>
                    </a>

                    <a class="nav__item" href="#/tests" data-route="tests">
                        <span class="nav__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                            </svg>
                        </span>
                        <span>Tests</span>
                    </a>
                </nav>
            </div>

            <button class="nav__item nav__item--logout" id="btn-logout">
                <span class="nav__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
                    </svg>
                </span>
                <span>Log out</span>
            </button>
        </aside>

        <!-- ─── MAIN (dynamic content) ─── -->
        <main class="main" id="app">
            <!-- Router injects views here -->
        </main>

    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Confirm modal overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 class="modal__title" id="modal-title"></h3>
            <p class="modal__message" id="modal-message"></p>
            <div class="modal__actions">
                <button class="btn btn--ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn--primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Submit Confirmation Modal (Tests) -->
    <dialog class="submit-confirm-modal" id="submitConfirmModal">
      <div class="submit-confirm-modal__content">
        <div class="submit-confirm-modal__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="var(--bg-800)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h3>Submit answers?</h3>
        <p>Once submitted you will not be able to modify your answers. Make sure you have reviewed all the questions before continuing.</p>
        <div class="submit-confirm-modal__actions">
          <button class="btn btn--ghost" id="cancelSubmitBtn" type="button">Review again</button>
          <button class="btn btn--primary" id="confirmSubmitBtn" type="button">Yes, submit answers</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="../../src/pages/candidate/app.js"></script>
</body>

</html>
