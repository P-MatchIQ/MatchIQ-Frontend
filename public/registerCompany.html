<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MatchIQ | Company Registration</title>
  <link rel="stylesheet" href="../src/styles/registerCompany.css" />
</head>

<body>
  <div class="bg">
    <main class="page">
      <section class="auth">

        <div class="auth__head">
            <img class="brand__logo" src="../src/assets/iconoMatchIQ.png" alt="MatchIQ logo" />
        </div>

        <form class="card">

          <!-- LEGAL INFORMATION -->
            <div class="grid-2">
              <div class="field">
                <label>Company Name</label>
                <input type="text" placeholder="Ex: TechNova Inc." required>
              </div>

              <div class="field">
                <label>Tax ID / Business ID</label>
                <input type="text" placeholder="900.000.000-0" required>
              </div>
            </div>

          <div class="divider"></div>

          <!-- CORPORATE ACCESS -->

            <div class="field">
              <label>Contact Email</label>
              <input type="email" placeholder="hr@company.com" required>
            </div>

            <div class="grid-2">
              <div class="field">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
              </div>

              <div class="field">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" required>
              </div>
            </div>

          <div class="terms">
            <label class="checkbox">
              <input type="checkbox" required>
              <span>
                I accept
                <a href="#">the terms and conditions</a>.
              </span>
              </span>
            </label>
          </div>

          <button class="btn btn--primary">
            Create Corporate Account →
          </button>

        </form>

      </section>
    </main>
  </div>
</body>
</html>
