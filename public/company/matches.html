<!-- ─── Matches View Fragment ─── -->
<header class="main__header">
    <div>
        <a href="#/offers" class="back-link">← Back to offers</a>
        <h1 id="matches-title">Candidate Matches</h1>
        <p class="muted" id="matches-subtitle">Finding the best candidates for your offer…</p>
    </div>
</header>

<!-- KPIs -->
<div class="kpis" id="matches-kpis" style="display: none;">
    <div class="kpi">
        <span class="kpi__label">TOTAL CANDIDATES</span>
        <strong class="kpi__value" id="match-kpi-total">0</strong>
    </div>
    <div class="kpi">
        <span class="kpi__label">BEST MATCH</span>
        <strong class="kpi__value" id="match-kpi-best">—</strong>
    </div>
    <div class="kpi kpi--accent">
        <span class="kpi__label">AI EVALUATED</span>
        <strong class="kpi__value" id="match-kpi-ai">0</strong>
    </div>
</div>

<!-- Candidate Cards -->
<div class="matches-grid" id="matches-container">
    <!-- JS renders candidate cards here -->
</div>

<!-- Candidate Profile Modal -->
<dialog class="candidate-modal" id="candidateModal">
    <div class="candidate-modal__content">
        <div class="candidate-modal__head">
            <div>
                <h3 id="modal-candidate-name">Candidate</h3>
                <p id="modal-candidate-email" class="muted"></p>
            </div>
            <button class="modal-close-btn" id="closeCandidateModal" type="button">✕</button>
        </div>

        <div class="candidate-modal__score-section" id="modal-score-section">
            <!-- Score gauge rendered by JS -->
        </div>

        <div class="candidate-modal__grid" id="modal-details-grid">
            <!-- Detail cards rendered by JS -->
        </div>

        <div id="modal-skills-section">
            <!-- Skills rendered by JS -->
        </div>

        <div id="modal-ai-section">
            <!-- AI evaluation rendered by JS -->
        </div>

        <div id="modal-test-section">
            <!-- Send Test action rendered by JS -->
        </div>
    </div>
</dialog>

<!-- Test Preview Modal -->
<dialog class="candidate-modal test-preview-modal" id="testPreviewModal">
    <div class="candidate-modal__content">
        <div class="candidate-modal__head">
            <div>
                <h3 id="preview-test-title">Test Preview</h3>
                <p class="muted" id="preview-test-meta"></p>
            </div>
            <button class="modal-close-btn" id="closeTestPreview" type="button">✕</button>
        </div>

        <div id="preview-questions-container">
            <!-- Questions rendered by JS -->
        </div>

        <div class="test-preview__actions">
            <button class="btn btn--ghost" id="previewCancelBtn">Cancel</button>
            <button class="btn btn--primary" id="previewConfirmBtn">Confirm &amp; Send Test</button>
        </div>
    </div>
</dialog>
