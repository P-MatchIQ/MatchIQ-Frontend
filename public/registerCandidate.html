<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MatchIQ | Talent Registration</title>
  <link rel="stylesheet" href="../src/styles/registerCandidate.css" />
</head>

<body>
  <div class="bg">
    <main class="page">
      <section class="auth">

        <div class="auth__head">
            <img class="logo" src="../src/assets/iconoMatchIQ.png" alt="MatchIQ logo"/>            
        </div>

        <form class="card">

          <!-- ACCESS -->
          <div class="section">           

            <div class="field">
              <label>Email Address</label>
              <input type="email" placeholder="email@example.com" required />
            </div>

            <div class="grid-2">
              <div class="field">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required />
              </div>

              <div class="field">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" required />
              </div>
            </div>
          </div>

          <div class="terms">
            <label class="checkbox">
              <input type="checkbox" required />
              <span>
                I accept
                <a href="#">the terms and conditions</a>.
              </span>
            </label>
          </div>

          <button class="btn btn--primary" type="submit">
            Create Talent Account →
          </button>

        </form>

      </section>
    </main>

  </div>
</body>
</html>
