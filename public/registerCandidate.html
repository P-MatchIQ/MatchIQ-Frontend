<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MatchIQ | Talent Registration</title>
  <link rel="stylesheet" href="../src/styles/registerCandidate.css" />
</head>

<body>
  <div class="bg">
    <main class="page">
      <section class="auth">

        <div class="auth__head">
          <img class="logo" src="../src/assets/iconoMatchIQ.png" alt="MatchIQ logo"/>
        </div>

        <!-- Banners de feedback -->
        <p id="error-banner"   class="banner banner--error"   hidden></p>
        <p id="success-banner" class="banner banner--success" hidden></p>

        <form class="card">

          <!-- ACCESS -->
          <div class="section">

            <div class="field">
              <label for="email">Email Address</label>
              <input
                id="email"
                type="email"
                placeholder="email@example.com"
                required
              />
            </div>

            <div class="grid-2">
              <div class="field">
                <label for="password">Password</label>
                <input
                  id="password"
                  type="password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input
                  id="confirmPassword"
                  type="password"
                  placeholder="••••••••"
                  required
                />
              </div>
            </div>
          </div>

          <div class="terms">
            <label class="checkbox">
              <input type="checkbox" required />
              <span>
                I accept
                <a href="#">the terms and conditions</a>.
              </span>
            </label>
          </div>

          <button class="btn btn--primary" type="submit">
            Create Talent Account →
          </button>

        </form>

        <p class="auth__footer">
          Already have an account? <a href="./login.html">Sign in</a>
        </p>

      </section>
    </main>
  </div>

  <script type="module" src="../src/pages/registerCandidate.js"></script>
</body>
</html>
